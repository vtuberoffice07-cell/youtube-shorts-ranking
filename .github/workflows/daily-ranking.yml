name: Daily VTuber Ranking

on:
  schedule:
    # 1日2回実行（GitHub Actionsはスケジュールをスキップすることがある）
    - cron: '0 22 * * *'   # 毎日 JST 7:00（UTC 22:00）
    - cron: '0 10 * * *'   # 毎日 JST 19:00（UTC 10:00）バックアップ
  workflow_dispatch:
    # 手動実行も可能

jobs:
  fetch-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ===== YouTube ランキング（失敗したら即エラーで見える化） =====
      - name: Run YouTube ranking (個人VTuber)
        id: youtube_personal
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          echo "::group::YouTube個人VTuberランキング"
          python main.py
          echo "::endgroup::"
          # ファイル更新を確認
          if git diff --name-only | grep -q ranking_history.json; then
            echo "✅ ranking_history.json が更新されました"
          else
            echo "⚠️ ranking_history.json に変更がありません"
          fi

      - name: Run YouTube ranking (全体版)
        id: youtube_all
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          echo "::group::YouTube全体ランキング"
          python main_all.py
          echo "::endgroup::"
          if git diff --name-only | grep -q ranking_all_history.json; then
            echo "✅ ranking_all_history.json が更新されました"
          else
            echo "⚠️ ranking_all_history.json に変更がありません"
          fi

      # ===== TikTok / Twitter（失敗しても続行） =====
      - name: Run TikTok ranking
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python tiktok_ranking.py
        continue-on-error: true

      - name: Run Twitter ranking
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python tweet_ranking.py
        continue-on-error: true

      # ===== ヒントレポート生成（API不要・毎回最新データで更新） =====
      - name: Generate hints report
        run: python generate_hints.py
        continue-on-error: true

      # ===== 診断ステップ =====
      - name: Diagnose file changes
        if: always()
        run: |
          echo "===== 環境変数チェック ====="
          if [ -z "${{ secrets.YOUTUBE_API_KEY }}" ]; then
            echo "❌ YOUTUBE_API_KEY が未設定です！"
          else
            echo "✅ YOUTUBE_API_KEY は設定済み"
          fi
          if [ -z "${{ secrets.APIFY_API_TOKEN }}" ]; then
            echo "❌ APIFY_API_TOKEN が未設定です！"
          else
            echo "✅ APIFY_API_TOKEN は設定済み"
          fi

          echo ""
          echo "===== ファイル更新状況 ====="
          echo "--- git diff (変更されたファイル) ---"
          git diff --name-only
          echo ""
          echo "--- 各ファイルの最終更新日時 ---"
          for f in ranking_history.json ranking_all_history.json tiktok_history.json tweet_history.json hints_report.json; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f")
              DATES=$(python3 -c "import json; d=json.load(open('$f')); print(sorted(d.keys())[-3:])" 2>/dev/null || echo "parse error")
              echo "  $f: ${SIZE}B, latest dates: $DATES"
            else
              echo "  $f: ファイルが存在しません ❌"
            fi
          done

      # ===== コミット & プッシュ =====
      - name: Commit and push results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 全データファイルをステージング（存在するものだけ）
          for f in ranking_history.json ranking_output.csv ranking_all_history.json ranking_all_output.csv tiktok_history.json tiktok_output.csv tiktok.db tweet_history.json tweet_output.csv tweets.db hints_report.json; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

          # 変更がある場合のみコミット
          if git diff --cached --quiet; then
            echo "⚠️ コミットする変更がありません（スクリプトがファイルを更新しなかった可能性）"
          else
            echo "変更をコミット中..."
            git diff --cached --stat
            git commit -m "ranking: $(date +%Y-%m-%d) のデータを追加"

            # プッシュ（リベース優先、失敗したらマージ）
            echo "プッシュ中..."
            git pull --rebase origin main 2>&1 || git pull origin main 2>&1
            git push 2>&1
            echo "✅ プッシュ完了"
          fi
