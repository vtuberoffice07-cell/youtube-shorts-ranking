name: Daily VTuber Ranking

on:
  schedule:
    # 1日2回実行で確実性を向上（GitHub Actionsはスケジュールをスキップすることがある）
    - cron: '0 22 * * *'   # 毎日 JST 7:00（UTC 22:00）
    - cron: '0 10 * * *'   # 毎日 JST 19:00（UTC 10:00）バックアップ
  workflow_dispatch:
    # 手動実行も可能

jobs:
  fetch-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run YouTube ranking (個人VTuber)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main.py
        continue-on-error: true

      - name: Run YouTube ranking (全体版)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main_all.py
        continue-on-error: true

      - name: Run TikTok ranking
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python tiktok_ranking.py
        continue-on-error: true

      - name: Run Twitter ranking
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python tweet_ranking.py
        continue-on-error: true

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ranking_history.json ranking_output.csv ranking_all_history.json ranking_all_output.csv tiktok_history.json tiktok_output.csv tweet_history.json tweet_output.csv tweets.db 2>/dev/null || true
          git diff --cached --quiet || git commit -m "ranking: $(date +%Y-%m-%d) のデータを追加"
          git pull --rebase origin main || git pull origin main
          git push
